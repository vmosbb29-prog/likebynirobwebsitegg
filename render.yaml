# Render deployment — Like By Nirob
# docs: https://render.com/docs/render-yaml-config

services:
  - type: web
    name: like-by-nirob
    runtime: node
    plan: free
    region: singapore
    buildCommand: npm install -g pnpm@10 && pnpm install && pnpm --filter @workspace/slv run build && pnpm --filter @workspace/api-server run build
    startCommand: node artifacts/api-server/dist/index.mjs
    healthCheckPath: /api/ping
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        sync: false        # Set this manually in Render dashboard
      - key: SESSION_SECRET
        generateValue: true
